name: nebula-ci

on:
  push:
  pull_request:

jobs:
  public-testnet:
    name: Nebula public testnet checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: nebula-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: nebula-cargo-${{ runner.os }}-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint with clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build Nebula testnet binary
        run: cargo build --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet

      - name: Smoke launch-bound lifecycle and follower evidence
        run: >
          cargo test --manifest-path crates/nebula-testnet/Cargo.toml
          --test public_admin_rpc_separation
          launch_bound_follower_exports_verifiable_runtime_surface_evidence
          -- --exact --nocapture

      - name: Smoke public/admin RPC split
        run: >
          cargo test --manifest-path crates/nebula-testnet/Cargo.toml
          --test public_admin_rpc_separation
          public_rpc_rejects_admin_methods_even_with_valid_token
          -- --exact --nocapture

      - name: Run Nebula test suite
        run: cargo test --workspace -- --test-threads=1

      - name: Check public launch readiness contract
        shell: bash
        run: |
          set -euo pipefail
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --mainnet-readiness --json)"
          NEBULA_READINESS_JSON="$output" python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["NEBULA_READINESS_JSON"])
          acceptance = payload["acceptance"]
          readiness = payload["public_launch_readiness"]
          economics = payload["economics"]
          roots = payload["status_roots"]
          assert acceptance["testnet_ready"] is True
          assert readiness["public_launch_ready"] is False
          assert readiness["level"] == "public-launch-blocked"
          assert readiness["blocking_gaps"] == ["public-launch-deployment-attestation"]
          assert readiness["remediation_root"]
          assert economics["native_fee_token"] == "NBLA"
          assert economics["bridged_fee_token"] == "nXMR"
          assert economics["native_base_unit"] == "nebulai"
          assert economics["nebulai_per_nbla"] == 1000000
          assert economics["target_nxmr_per_nbla_numerator"] == 1
          assert economics["target_nxmr_per_nbla_denominator"] == 1000
          assert economics["target_nxmr_base_units_per_nxmr"] == 1000000000
          assert economics["target_nxmr_to_nbla_rate_nebulai_per_unit"] == 1
          assert economics["nxmr_reserve_backing_bps"] == 9000
          assert economics["nxmr_validator_reward_bps"] == 1000
          assert roots["validator_admission"]
          assert roots["genesis_manifest"]
          assert roots["launch_package"]
          assert roots["launch_package_bundle"]
          assert roots["validator_activation"]
          assert roots["validator_join"]
          assert roots["operator_join_confirmation"]
          assert roots["public_observer_confirmation"]
          assert roots["public_testnet_launch_certificate"]
          assert roots["public_status_surface"]
          assert roots["public_probe_surface"]
          assert roots["preflight_receipt"]
          assert roots["runbook_receipt"]
          PY

      - name: Verify public status and probe surface
        shell: bash
        run: |
          set -euo pipefail
          status="$(mktemp)"
          probe="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-status > "$status"
          status_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-status "$status" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-probe > "$probe"
          probe_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-probe "$probe" --json)"
          NEBULA_PUBLIC_STATUS_JSON="$status_output" NEBULA_PUBLIC_PROBE_JSON="$probe_output" python3 - <<'PY'
          import json
          import os

          status = json.loads(os.environ["NEBULA_PUBLIC_STATUS_JSON"])
          probe = json.loads(os.environ["NEBULA_PUBLIC_PROBE_JSON"])
          assert status["public_status_ready"] is True
          assert status["level"] == "public-status-attested"
          assert len(status["public_status_manifest_root"]) == 64
          assert status["endpoint_url"] == "https://testnet.nebula.example/status"
          assert len(status["launch_bundle_root"]) == 64
          assert probe["public_probe_ready"] is True
          assert probe["level"] == "public-probe-attested"
          assert len(probe["public_probe_root"]) == 64
          assert probe["endpoint_url"] == status["endpoint_url"]
          assert probe["launch_bundle_root"] == status["launch_bundle_root"]
          assert len(probe["fee_policy_root"]) == 64
          PY

      - name: Verify preflight and runbook receipts
        shell: bash
        run: |
          set -euo pipefail
          preflight="$(mktemp)"
          runbook="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-preflight-receipt > "$preflight"
          preflight_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-preflight-receipt "$preflight" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-runbook-receipt > "$runbook"
          runbook_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-runbook-receipt "$runbook" --json)"
          NEBULA_PREFLIGHT_JSON="$preflight_output" NEBULA_RUNBOOK_JSON="$runbook_output" python3 - <<'PY'
          import json
          import os

          preflight = json.loads(os.environ["NEBULA_PREFLIGHT_JSON"])
          runbook = json.loads(os.environ["NEBULA_RUNBOOK_JSON"])
          assert preflight["receipt_ready"] is True
          assert preflight["level"] == "receipt-attested"
          assert preflight["receipt_id"] == "preflight-receipt"
          assert len(preflight["receipt_root"]) == 64
          assert preflight["phase_count"] >= 1
          assert preflight["step_count"] >= 1
          assert runbook["receipt_ready"] is True
          assert runbook["level"] == "receipt-attested"
          assert runbook["receipt_id"] == "runbook-receipt"
          assert len(runbook["receipt_root"]) == 64
          assert runbook["phase_count"] >= 1
          assert runbook["step_count"] >= 1
          PY

      - name: Verify deployment attestation gate
        shell: bash
        run: |
          set -euo pipefail
          sample="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-deployment-attestation > "$sample"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-deployment-attestation "$sample" --json)"
          NEBULA_ATTESTATION_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_ATTESTATION_JSON"])
          assert payload["public_launch_ready"] is True
          assert payload["level"] == "public-launch-attested"
          assert len(payload["evidence_root"]) == 64
          assert len(payload["witness_evidence_root"]) == 64
          assert payload["verified_operator_count"] >= 2
          assert payload["verified_observer_count"] >= 2
          assert payload["verified_region_count"] >= 2
          PY

      - name: Verify validator set gate
        shell: bash
        run: |
          set -euo pipefail
          sample="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-validator-set > "$sample"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-validator-set "$sample" --json)"
          NEBULA_VALIDATOR_SET_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_VALIDATOR_SET_JSON"])
          assert payload["validator_set_ready"] is True
          assert payload["level"] == "validator-set-attested"
          assert len(payload["validator_set_root"]) == 64
          assert payload["validator_count"] >= 2
          assert payload["operator_count"] >= 2
          assert payload["region_count"] >= 2
          assert payload["total_genesis_power"] > 0
          assert payload["reward_unit"] == "nebulai"
          PY

      - name: Verify genesis manifest gate
        shell: bash
        run: |
          set -euo pipefail
          attestation="$(mktemp)"
          validators="$(mktemp)"
          genesis="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-deployment-attestation > "$attestation"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-validator-set > "$validators"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-genesis-manifest --deployment-attestation "$attestation" --validator-set "$validators" > "$genesis"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-genesis-manifest "$genesis" --json)"
          NEBULA_GENESIS_JSON="$output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_GENESIS_JSON"])
          assert payload["genesis_ready"] is True
          assert payload["level"] == "genesis-manifest-attested"
          assert len(payload["genesis_root"]) == 64
          assert len(payload["deployment_attestation_root"]) == 64
          assert len(payload["validator_set_root"]) == 64
          assert payload["initial_validator_count"] >= 2
          assert payload["initial_total_power"] > 0
          assert payload["activation_height"] > 0
          PY

      - name: Verify launch package gate
        shell: bash
        run: |
          set -euo pipefail
          attestation="$(mktemp)"
          public_status="$(mktemp)"
          public_probe="$(mktemp)"
          validators="$(mktemp)"
          handoff="$(mktemp)"
          acceptance="$(mktemp)"
          genesis="$(mktemp)"
          bundle="$(mktemp)"
          activation="$(mktemp)"
          join_receipt="$(mktemp)"
          join_confirmation="$(mktemp)"
          observer_confirmation="$(mktemp)"
          runtime_surface="$(mktemp)"
          external_runtime_surface="$(mktemp)"
          external_launch_certificate="$(mktemp)"
          launch_certificate="$(mktemp)"
          runtime_health="$(mktemp)"
          runtime_status="$(mktemp)"
          runtime_snapshot="$(mktemp)"
          runtime_ops="$(mktemp)"
          runtime_backup="$(mktemp)"
          runtime_rpc_status="$(mktemp)"
          runtime_rpc_ops_status="$(mktemp)"
          runtime_rpc_backup_manifest="$(mktemp)"
          runtime_metrics="$(mktemp)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-deployment-attestation > "$attestation"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-status > "$public_status"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-public-probe > "$public_probe"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --sample-validator-set > "$validators"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-operator-handoff --deployment-attestation "$attestation" --validator-set "$validators" > "$handoff"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-operator-acceptance --operator-handoff "$handoff" --deployment-attestation "$attestation" --validator-set "$validators" > "$acceptance"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-genesis-manifest --deployment-attestation "$attestation" --validator-set "$validators" > "$genesis"
          output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-launch-package --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-launch-package-bundle --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$bundle"
          bundle_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-validator-activation --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$activation"
          activation_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-validator-join --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$join_receipt"
          join_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-operator-join-confirmation --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$join_confirmation"
          confirmation_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-public-observer-confirmation --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$observer_confirmation"
          observer_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-observer-confirmation "$observer_confirmation" --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-live-rpc-devnet-runtime-surface --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$runtime_surface"
          runtime_surface_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-runtime-surface-evidence "$runtime_surface" --json)"
          NEBULA_RUNTIME_SURFACE_FILE="$runtime_surface" NEBULA_RUNTIME_HEALTH_FILE="$runtime_health" NEBULA_RUNTIME_STATUS_FILE="$runtime_status" NEBULA_RUNTIME_SNAPSHOT_FILE="$runtime_snapshot" NEBULA_RUNTIME_OPS_FILE="$runtime_ops" NEBULA_RUNTIME_BACKUP_FILE="$runtime_backup" NEBULA_RUNTIME_RPC_STATUS_FILE="$runtime_rpc_status" NEBULA_RUNTIME_RPC_OPS_STATUS_FILE="$runtime_rpc_ops_status" NEBULA_RUNTIME_RPC_BACKUP_MANIFEST_FILE="$runtime_rpc_backup_manifest" NEBULA_RUNTIME_METRICS_FILE="$runtime_metrics" python3 - <<'PY'
          import json
          import os

          with open(os.environ["NEBULA_RUNTIME_SURFACE_FILE"], encoding="utf-8") as handle:
              evidence = json.load(handle)
          for env_name, key in [
              ("NEBULA_RUNTIME_HEALTH_FILE", "health"),
              ("NEBULA_RUNTIME_STATUS_FILE", "status"),
              ("NEBULA_RUNTIME_SNAPSHOT_FILE", "snapshot"),
              ("NEBULA_RUNTIME_OPS_FILE", "ops"),
              ("NEBULA_RUNTIME_BACKUP_FILE", "backup"),
              ("NEBULA_RUNTIME_RPC_STATUS_FILE", "rpc_status"),
              ("NEBULA_RUNTIME_RPC_OPS_STATUS_FILE", "rpc_ops_status"),
              ("NEBULA_RUNTIME_RPC_BACKUP_MANIFEST_FILE", "rpc_backup_manifest"),
          ]:
              with open(os.environ[env_name], "w", encoding="utf-8") as handle:
                  json.dump(evidence[key], handle, separators=(",", ":"))
          with open(os.environ["NEBULA_RUNTIME_METRICS_FILE"], "w", encoding="utf-8") as handle:
              handle.write(evidence["metrics_text"])
          PY
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-runtime-surface-evidence --endpoint-url "https://testnet.nebula.example/status" --health "$runtime_health" --status "$runtime_status" --snapshot "$runtime_snapshot" --ops "$runtime_ops" --backup "$runtime_backup" --rpc-status "$runtime_rpc_status" --rpc-ops-status "$runtime_rpc_ops_status" --rpc-backup-manifest "$runtime_rpc_backup_manifest" --metrics "$runtime_metrics" > "$external_runtime_surface"
          external_runtime_surface_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-runtime-surface-evidence "$external_runtime_surface" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-public-testnet-launch-certificate --public-observer-confirmation "$observer_confirmation" --runtime-surface-evidence "$runtime_surface" --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$launch_certificate"
          certificate_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-testnet-launch-certificate "$launch_certificate" --public-observer-confirmation "$observer_confirmation" --runtime-surface-evidence "$runtime_surface" --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --build-public-testnet-launch-certificate --public-observer-confirmation "$observer_confirmation" --runtime-surface-evidence "$external_runtime_surface" --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" > "$external_launch_certificate"
          readiness_output="$(cargo run --manifest-path crates/nebula-testnet/Cargo.toml --bin nebula-testnet -- --verify-public-testnet-launch-readiness "$external_launch_certificate" --public-observer-confirmation "$observer_confirmation" --runtime-surface-evidence "$external_runtime_surface" --operator-join-confirmation "$join_confirmation" --validator-join "$join_receipt" --validator-activation "$activation" --launch-package-bundle "$bundle" --deployment-attestation "$attestation" --public-status "$public_status" --public-probe "$public_probe" --validator-set "$validators" --operator-handoff "$handoff" --operator-acceptance "$acceptance" --genesis-manifest "$genesis" --json)"
          NEBULA_LAUNCH_PACKAGE_JSON="$output" NEBULA_LAUNCH_PACKAGE_BUNDLE_JSON="$bundle_output" NEBULA_VALIDATOR_ACTIVATION_JSON="$activation_output" NEBULA_VALIDATOR_JOIN_JSON="$join_output" NEBULA_OPERATOR_JOIN_CONFIRMATION_JSON="$confirmation_output" NEBULA_PUBLIC_OBSERVER_CONFIRMATION_JSON="$observer_output" NEBULA_RUNTIME_SURFACE_JSON="$runtime_surface_output" NEBULA_EXTERNAL_RUNTIME_SURFACE_JSON="$external_runtime_surface_output" NEBULA_PUBLIC_TESTNET_LAUNCH_CERTIFICATE_JSON="$certificate_output" NEBULA_PUBLIC_TESTNET_LAUNCH_READINESS_JSON="$readiness_output" python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["NEBULA_LAUNCH_PACKAGE_JSON"])
          bundle = json.loads(os.environ["NEBULA_LAUNCH_PACKAGE_BUNDLE_JSON"])
          activation = json.loads(os.environ["NEBULA_VALIDATOR_ACTIVATION_JSON"])
          join = json.loads(os.environ["NEBULA_VALIDATOR_JOIN_JSON"])
          confirmation = json.loads(os.environ["NEBULA_OPERATOR_JOIN_CONFIRMATION_JSON"])
          observer = json.loads(os.environ["NEBULA_PUBLIC_OBSERVER_CONFIRMATION_JSON"])
          runtime_surface = json.loads(os.environ["NEBULA_RUNTIME_SURFACE_JSON"])
          external_runtime_surface = json.loads(os.environ["NEBULA_EXTERNAL_RUNTIME_SURFACE_JSON"])
          certificate = json.loads(os.environ["NEBULA_PUBLIC_TESTNET_LAUNCH_CERTIFICATE_JSON"])
          readiness = json.loads(os.environ["NEBULA_PUBLIC_TESTNET_LAUNCH_READINESS_JSON"])
          assert payload["launch_package_ready"] is True
          assert payload["level"] == "launch-package-attested"
          assert len(payload["deployment_attestation_root"]) == 64
          assert len(payload["witness_evidence_root"]) == 64
          assert len(payload["public_status_manifest_root"]) == 64
          assert len(payload["public_probe_root"]) == 64
          assert payload["endpoint_url"] == "https://testnet.nebula.example/status"
          assert len(payload["launch_bundle_root"]) == 64
          assert len(payload["fee_policy_root"]) == 64
          assert len(payload["validator_set_root"]) == 64
          assert len(payload["operator_handoff_root"]) == 64
          assert len(payload["genesis_root"]) == 64
          assert payload["matched_validator_count"] == payload["validator_count"]
          assert payload["deployment_operator_count"] >= 2
          assert payload["bootstrap_node_count"] >= 2
          assert payload["validator_count"] >= 2
          assert payload["total_genesis_power"] > 0
          assert payload["activation_height"] > 0
          assert bundle["launch_package_bundle_ready"] is True
          assert bundle["level"] == "launch-package-bundle-attested"
          assert len(bundle["launch_package_bundle_root"]) == 64
          assert len(bundle["launch_package_root"]) == 64
          assert len(bundle["operator_acceptance_root"]) == 64
          assert bundle["artifact_count"] == 7
          assert bundle["validator_count"] == payload["validator_count"]
          assert activation["validator_activation_ready"] is True
          assert activation["level"] == "validator-activation-attested"
          assert len(activation["validator_activation_root"]) == 64
          assert activation["launch_package_bundle_root"] == bundle["launch_package_bundle_root"]
          assert activation["operator_acceptance_root"] == bundle["operator_acceptance_root"]
          assert activation["activated_validator_count"] == payload["validator_count"]
          assert activation["activated_operator_count"] == payload["matched_operator_count"]
          assert join["validator_join_ready"] is True
          assert join["level"] == "validator-join-attested"
          assert len(join["validator_join_root"]) == 64
